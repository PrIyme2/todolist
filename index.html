<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">ClassTask … Die ToDo-App für deine Klasse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        *:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        .tabular-numbers {
            font-variant-numeric: tabular-nums;
        }
        .fade-transition {
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @media (prefers-reduced-motion: reduce) {
            .fade-transition {
                transition: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">

    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
        Zum Hauptinhalt springen
    </a>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold tracking-tight text-blue-600" translate="no">ClassTask</span>
                <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">v1.0</span>
            </div>
            <div id="auth-status" class="flex items-center gap-3">
                <div class="h-8 w-24 bg-slate-200 animate-pulse rounded-md" aria-hidden="true"></div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        
        <div class="flex border-b border-slate-200 mb-6" role="tablist" aria-label="Aufgabenbereiche">
            <button id="tab-public" role="tab" aria-selected="true" aria-controls="panel-todos" class="flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600 fade-transition">
                👥 Klassen-ToDos <span id="count-public" class="ml-1 text-xs bg-blue-50 px-2 py-0.5 rounded-full tabular-numbers">0</span>
            </button>
            <button id="tab-private" role="tab" aria-selected="false" aria-controls="panel-todos" class="flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300 fade-transition">
                🔒 Meine Aufgaben <span id="count-private" class="ml-1 text-xs bg-slate-100 px-2 py-0.5 rounded-full tabular-numbers">0</span>
            </button>
        </div>

        <div id="error-toast" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex items-center gap-2" role="alert">
            <span class="font-bold">Meldung:</span> <span id="error-message"></span>
        </div>

        <form id="todo-form" class="mb-6 flex gap-2">
            <input type="text" id="todo-input" required minlength="2" placeholder="Neue Aufgabe für die Klasse hinzufügen…" 
                   class="flex-grow px-4 py-2.5 bg-white border border-slate-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-base"
                   aria-label="Neue Aufgabe Text">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg shadow-sm active:scale-[0.98] fade-transition">
                Hinzufügen
            </button>
        </form>

        <section id="panel-todos" role="tabpanel" aria-labelledby="tab-public" class="space-y-2">
            <div id="todo-skeleton" class="space-y-2">
                <div class="h-14 bg-white border border-slate-200 rounded-lg animate-pulse"></div>
                <div class="h-14 bg-white border border-slate-200 rounded-lg animate-pulse"></div>
            </div>
            
            <ul id="todo-list" class="space-y-2"></ul>

            <div id="empty-state" class="hidden text-center py-12 text-slate-400 border-2 border-dashed border-slate-200 rounded-lg">
                <p class="text-lg font-medium">Alles erledigt! 🎉</p>
                <p class="text-sm">Füge oben eine neue Aufgabe hinzu.</p>
            </div>
        </section>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 relative fade-transition scale-95 opacity-0" id="modal-card">
            <h2 id="modal-title" class="text-xl font-bold mb-4">Anmelden / Registrieren</h2>
            <p class="text-sm text-slate-500 mb-4">Gib deine E-Mail ein, um deine privaten ToDos freizuschalten.</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="auth-email" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">E-Mail-Adresse</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label for="auth-password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Passwort</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-4 py-2 border border-slate-300 rounded-lg">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="btn-close-modal" class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg font-medium hover:bg-slate-50">Abbrechen</button>
                    <button type="submit" id="btn-submit-auth" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Bestätigen</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-white border-t border-slate-200 py-6 mt-12 text-center text-xs text-slate-400">
        <p>&copy; 2026 ClassTask. Bereitgestellt für die ganze Klasse.</p>
    </footer>

    <script>
        // ECHTE KEYS DIREKT INTEGRIERT
        const SUPABASE_URL = "https://tlsrphqvnpvjaansofps.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_MHgFfuEb1Z8_Yq4vqfS2lg_QSvbeOUG";
        
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        let currentTab = 'public'; 
        let user = null;
        let todos = [];

        const tabPublic = document.getElementById('tab-public');
        const tabPrivate = document.getElementById('tab-private');
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const todoSkeleton = document.getElementById('todo-skeleton');
        const emptyState = document.getElementById('empty-state');
        const authStatus = document.getElementById('auth-status');
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');
        const modalCard = document.getElementById('modal-card');

        async function init() {
            setupEventListeners();
            if(!supabase) {
                showError("Supabase konnte nicht geladen werden.");
                todoSkeleton.classList.add('hidden');
                return;
            }
            
            const { data: { session } } = await supabase.auth.getSession();
            updateUser(session?.user ?? null);

            supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', filter: 'is_public=eq.true', schema: 'public', table: 'todos' }, () => {
                    if (currentTab === 'public') fetchTodos();
                })
                .subscribe();

            fetchTodos();
        }

        function updateUser(userData) {
            user = userData;
            if (user) {
                authStatus.innerHTML = `
                    <span class="text-sm text-slate-600 hidden sm:inline" translate="no">${user.email}</span>
                    <button id="btn-logout" class="text-sm font-medium text-red-600 hover:text-red-700 border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded-lg fade-transition">Abmelden</button>
                `;
                document.getElementById('btn-logout').addEventListener('click', () => supabase.auth.signOut());
            } else {
                authStatus.innerHTML = `
                    <button id="btn-open-login" class="text-sm font-medium bg-slate-900 text-white hover:bg-slate-800 px-4 py-1.5 rounded-lg shadow-sm fade-transition">Anmelden</button>
                `;
                document.getElementById('btn-open-login').addEventListener('click', openModal);
            }
            updateCounts();
        }

        async function fetchTodos() {
            if(!supabase) return;
            todoSkeleton.classList.remove('hidden');
            todoList.innerHTML = '';
            emptyState.classList.add('hidden');

            let query = supabase.from('todos').select('*');

            if (currentTab === 'public') {
                query = query.eq('is_public', true);
            } else {
                if (!user) {
                    todoSkeleton.classList.add('hidden');
                    todoList.innerHTML = `<li class="text-center py-6 text-slate-500">Bitte melde dich an, um deine privaten ToDos zu sehen.</li>`;
                    return;
                }
                query = query.eq('is_public', false).eq('user_id', user.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });
            todoSkeleton.classList.add('hidden');

            if (error) {
                showError(error.message);
                return;
            }

            todos = data;
            renderTodos();
            updateCounts();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-4 bg-white border border-slate-200 rounded-lg shadow-sm fade-transition hover:border-slate-300";
                
                const isChecked = todo.is_completed ? 'checked' : '';
                const textStyle = todo.is_completed ? 'line-through text-slate-400' : 'text-slate-700';

                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${isChecked} data-id="${todo.id}" 
                               aria-label="Aufgabe als erledigt markieren"
                               class="todo-toggle w-5 h-5 rounded text-blue-600 border-slate-300 focus:ring-blue-500">
                        <span class="${textStyle} font-medium">${escapeHTML(todo.title)}</span>
                    </div>
                    <button data-id="${todo.id}" aria-label="Aufgabe löschen" 
                            class="todo-delete text-slate-400 hover:text-red-600 p-1 rounded hover:bg-slate-50 fade-transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = todoInput.value.trim();
            if (!title || !supabase) return;

            const isPublic = (currentTab === 'public');
            
            if (!isPublic && !user) {
                showError("Du musst eingeloggt sein, um private ToDos zu erstellen.");
                return;
            }

            const payload = {
                title: title,
                is_public: isPublic,
                user_id: user ? user.id : null
            };

            const { error } = await supabase.from('todos').insert([payload]);

            if (error) {
                showError(error.message);
            } else {
                todoInput.value = '';
                fetchTodos();
            }
        });

        todoList.addEventListener('click', async (e) => {
            const target = e.target;
            
            if (target.classList.contains('todo-toggle')) {
                const id = target.getAttribute('data-id');
                const isCompleted = target.checked;
                const { error } = await supabase.from('todos').update({ is_completed: isCompleted }).eq('id', id);
                if (error) showError(error.message);
                else fetchTodos();
            }

            if (target.closest('.todo-delete')) {
                const btn = target.closest('.todo-delete');
                const id = btn.getAttribute('data-id');
                const { error } = await supabase.from('todos').delete().eq('id', id);
                if (error) showError(error.message);
                else fetchTodos();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const submitBtn = document.getElementById('btn-submit-auth');

            submitBtn.disabled = true;
            submitBtn.innerText = "Verarbeite…";

            let { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error && error.message.includes("Invalid login credentials")) {
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                error = signUpError;
                if (!signUpError) alert("Account erfolgreich erstellt! Du bist jetzt eingeloggt.");
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "Bestätigen";

            if (error) {
                showError(error.message);
            } else {
                closeModal();
                if(supabase) {
                    const { data: { session } } = await supabase.auth.getSession();
                    updateUser(session?.user ?? null);
                }
                fetchTodos();
            }
        });

        if(supabase) {
            supabase.auth.onAuthStateChange((event, session) => {
                updateUser(session?.user ?? null);
                fetchTodos();
            });
        }

        function setupEventListeners() {
            tabPublic.addEventListener('click', () => switchTab('public'));
            tabPrivate.addEventListener('click', () => switchTab('private'));
            document.getElementById('btn-close-modal').addEventListener('click', closeModal);
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'public') {
                tabPublic.className = "flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600 fade-transition";
                tabPrivate.className = "flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300 fade-transition";
                todoInput.placeholder = "Neue Aufgabe für die Klasse hinzufügen…";
            } else {
                tabPrivate.className = "flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600 fade-transition";
                tabPublic.className = "flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300 fade-transition";
                todoInput.placeholder = "Persönliche, private Aufgabe hinzufügen…";
            }
            fetchTodos();
        }

        async function updateCounts() {
            if (!supabase) return;
            const { count: pubCount } = await supabase.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', true);
            document.getElementById('count-public').innerText = pubCount || 0;

            if (user) {
                const { count: privCount } = await supabase.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', false).eq('user_id', user.id);
                document.getElementById('count-private').innerText = privCount || 0;
            } else {
                document.getElementById('count-private').innerText = '0';
            }
        }

        function openModal() {
            loginModal.classList.remove('hidden');
            setTimeout(() => {
                modalCard.classList.remove('scale-95', 'opacity-0');
                modalCard.classList.add('scale-100', 'opacity-100');
                document.getElementById('auth-email').focus();
            }, 50);
        }

        function closeModal() {
            modalCard.classList.remove('scale-100', 'opacity-100');
            modalCard.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                loginModal.classList.add('hidden');
            }, 200);
        }

        function showError(message) {
            const errorToast = document.getElementById('error-toast');
            document.getElementById('error-message').innerText = message;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 6000);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
