<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">ClassTask … Die ToDo-App für deine Klasse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
        .tabular-numbers { font-variant-numeric: tabular-nums; }
        .fade-transition { transition: opacity 0.2s ease, transform 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl font-bold tracking-tight text-blue-600" translate="no">ClassTask</span>
                <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">v1.0</span>
            </div>
            <div id="auth-status" class="flex items-center gap-3">
                <button id="btn-open-login" class="text-sm font-medium bg-slate-900 text-white hover:bg-slate-800 px-4 py-1.5 rounded-lg shadow-sm">Anmelden</button>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        
        <div class="flex border-b border-slate-200 mb-6" role="tablist">
            <button id="tab-public" class="flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600">
                👥 Klassen-ToDos <span id="count-public" class="ml-1 text-xs bg-blue-50 px-2 py-0.5 rounded-full tabular-numbers">0</span>
            </button>
            <button id="tab-private" class="flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800">
                🔒 Meine Aufgaben <span id="count-private" class="ml-1 text-xs bg-slate-100 px-2 py-0.5 rounded-full tabular-numbers">0</span>
            </button>
        </div>

        <div id="error-toast" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg flex flex-col gap-1" role="alert">
            <span class="font-bold">Datenbank-Fehlermeldung:</span>
            <span id="error-message" class="font-mono text-sm break-all"></span>
        </div>

        <form id="todo-form" class="mb-6 flex gap-2">
            <input type="text" id="todo-input" required minlength="2" placeholder="Neue Aufgabe für die Klasse hinzufügen…" 
                   class="flex-grow px-4 py-2.5 bg-white border border-slate-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-base">
            <button type="submit" id="btn-submit-todo" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg shadow-sm transition-all">
                Hinzufügen
            </button>
        </form>

        <section id="panel-todos" class="space-y-2">
            <ul id="todo-list" class="space-y-2"></ul>
            <div id="empty-state" class="hidden text-center py-12 text-slate-400 border-2 border-dashed border-slate-200 rounded-lg">
                <p class="text-lg font-medium">Alles erledigt! 🎉</p>
                <p class="text-sm">Füge oben eine neue Aufgabe hinzu.</p>
            </div>
        </section>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 relative" id="modal-card">
            <h2 class="text-xl font-bold mb-4">Anmelden / Registrieren</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">E-Mail-Adresse</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Passwort</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-4 py-2 border border-slate-300 rounded-lg">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="btn-close-modal" class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg">Abbrechen</button>
                    <button type="submit" id="btn-submit-auth" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg">Bestätigen</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-white border-t border-slate-200 py-6 mt-12 text-center text-xs text-slate-400">
        <p>&copy; 2026 ClassTask. Bereitgestellt für die ganze Klasse.</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://tlsrphqvnpvjaansofps.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_MHgFfuEb1Z8_Yq4vqfS2lg_QSvbeOUG";
        
        // Verwende den korrekten globalen Key, falls das Skript asynchron lädt
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        let currentTab = 'public'; 
        let user = null;
        let todos = [];

        const tabPublic = document.getElementById('tab-public');
        const tabPrivate = document.getElementById('tab-private');
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        const authStatus = document.getElementById('auth-status');
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');

        async function init() {
            setupEventListeners();
            if(!supabase) {
                showError("Der Supabase-Client wurde nicht korrekt initialisiert. Überprüfe die Skript-Quelle.");
                return;
            }
            try {
                const { data: { session } } = await supabase.auth.getSession();
                updateUser(session?.user ?? null);
            } catch(e) {
                console.log("Keine aktive Session gefunden.");
            }
            fetchTodos();
        }

        function updateUser(userData) {
            user = userData;
            if (user) {
                authStatus.innerHTML = `
                    <span class="text-sm text-slate-600 hidden sm:inline">${user.email}</span>
                    <button id="btn-logout" class="text-sm font-medium text-red-600 border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded-lg">Abmelden</button>
                `;
                document.getElementById('btn-logout').addEventListener('click', async () => {
                    await supabase.auth.signOut();
                    window.location.reload();
                });
            } else {
                authStatus.innerHTML = `
                    <button id="btn-open-login" class="text-sm font-medium bg-slate-900 text-white hover:bg-slate-800 px-4 py-1.5 rounded-lg shadow-sm">Anmelden</button>
                `;
                document.getElementById('btn-open-login').addEventListener('click', () => loginModal.classList.remove('hidden'));
            }
            updateCounts();
        }

        async function fetchTodos() {
            if(!supabase) return;
            document.getElementById('error-toast').classList.add('hidden');
            
            let query = supabase.from('todos').select('*');

            if (currentTab === 'public') {
                query = query.or('is_public.eq.true,is_public.is.null');
            } else {
                if (!user) {
                    todoList.innerHTML = `<li class="text-center py-6 text-slate-500">Bitte melde dich an, um deine privaten ToDos zu sehen.</li>`;
                    emptyState.classList.add('hidden');
                    return;
                }
                query = query.eq('is_public', false).eq('user_id', user.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                showError("Fehler beim Laden der Aufgaben: " + error.message + " (Code: " + error.code + ")");
                return;
            }

            todos = data || [];
            renderTodos();
            updateCounts();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-4 bg-white border border-slate-200 rounded-lg shadow-sm";
                const isChecked = todo.is_completed ? 'checked' : '';
                const textStyle = todo.is_completed ? 'line-through text-slate-400' : 'text-slate-700';

                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${isChecked} data-id="${todo.id}" class="todo-toggle w-5 h-5 rounded text-blue-600 border-slate-300">
                        <span class="${textStyle} font-medium">${escapeHTML(todo.title)}</span>
                    </div>
                    <button data-id="${todo.id}" class="todo-delete text-slate-400 hover:text-red-600 p-1 rounded">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-todo');
            const title = todoInput.value.trim();
            if (!title || !supabase) return;

            btn.disabled = true;
            btn.innerText = "Speichert…";

            const isPublic = (currentTab === 'public');
            const payload = { 
                title: title, 
                is_public: isPublic, 
                user_id: user ? user.id : null 
            };

            const { error } = await supabase.from('todos').insert([payload]);
            
            btn.disabled = false;
            btn.innerText = "Hinzufügen";

            if (error) {
                showError("Fehler beim Hinzufügen: " + error.message + " | Details: " + error.details + " (Code: " + error.code + ")");
            } else { 
                todoInput.value = ''; 
                fetchTodos(); 
            }
        });

        todoList.addEventListener('click', async (e) => {
            const target = e.target;
            if (target.classList.contains('todo-toggle')) {
                const id = target.getAttribute('data-id');
                const { error } = await supabase.from('todos').update({ is_completed: target.checked }).eq('id', id);
                if (error) showError(error.message);
                else fetchTodos();
            }
            if (target.closest('.todo-delete')) {
                const id = target.closest('.todo-delete').getAttribute('data-id');
                const { error } = await supabase.from('todos').delete().eq('id', id);
                if (error) showError(error.message);
                else fetchTodos();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            let { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                let { error: signUpError } = await supabase.auth.signUp({ email, password });
                error = signUpError;
            }

            if (error) showError(error.message);
            else window.location.reload();
        });

        function setupEventListeners() {
            tabPublic.addEventListener('click', () => switchTab('public'));
            tabPrivate.addEventListener('click', () => switchTab('private'));
            document.getElementById('btn-close-modal').addEventListener('click', () => loginModal.classList.add('hidden'));
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'public') {
                tabPublic.className = "flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600";
                tabPrivate.className = "flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800";
                todoInput.placeholder = "Neue Aufgabe für die Klasse hinzufügen…";
            } else {
                tabPrivate.className = "flex-1 py-3 text-center font-medium border-b-2 border-blue-600 text-blue-600";
                tabPublic.className = "flex-1 py-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800";
                todoInput.placeholder = "Persönliche, private Aufgabe hinzufügen…";
            }
            fetchTodos();
        }

        async function updateCounts() {
            if (!supabase) return;
            try {
                const { count: pubCount } = await supabase.from('todos').select('*', { count: 'exact', head: true }).or('is_public.eq.true,is_public.is.null');
                document.getElementById('count-public').innerText = pubCount || 0;
                if (user) {
                    const { count: privCount } = await supabase.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', false).eq('user_id', user.id);
                    document.getElementById('count-private').innerText = privCount || 0;
                } else document.getElementById('count-private').innerText = '0';
            } catch(e) {}
        }

        function showError(msg) { 
            const toast = document.getElementById('error-toast'); 
            document.getElementById('error-message').innerText = msg; 
            toast.classList.remove('hidden'); 
        }
        function escapeHTML(str) { return str ? str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
