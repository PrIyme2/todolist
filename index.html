<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">ClassTask // Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'Inter', 'sans-serif'],
                        mono: ['Geist Mono', 'JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            bg: '#09090b',
                            card: '#121214',
                            border: 'rgba(255, 255, 255, 0.06)',
                            borderHover: 'rgba(255, 255, 255, 0.12)',
                            accent: '#4f46e5',
                            accentHover: '#6366f1',
                            textMuted: '#a1a1aa'
                        }
                    },
                    boxShadow: {
                        'premium': '0 0 0 1px rgba(255, 255, 255, 0.03), 0 8px 32px -4px rgba(0, 0, 0, 0.5)',
                        'input-focus': '0 0 0 2px rgba(79, 70, 229, 0.2), 0 0 20px -5px rgba(79, 70, 229, 0.3)',
                    }
                }
            }
        }
    </script>

    <style>
        *:focus-visible { outline: 1px solid #4f46e5; outline-offset: 2px; }
        .tabular-numbers { font-variant-numeric: tabular-nums; }
        
        /* High-End Engineering Dot Matrix Background */
        .bg-dot-pattern {
            background-size: 20px 20px;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }
        
        /* Sophisticated Ambient Lighting */
        .ambient-blur {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            height: 300px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.07) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Modern Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        /* Clean Date Picker Fixes */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
            transition: filter 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            filter: invert(0.9);
        }
    </style>
</head>
<body class="bg-brand-bg text-zinc-200 font-sans antialiased min-h-screen flex flex-col selection:bg-indigo-500/20 selection:text-indigo-200 bg-dot-pattern relative px-4 sm:px-0">

    <div class="ambient-blur"></div>

    <header class="bg-brand-bg/60 backdrop-blur-md border-b border-brand-border sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3.5">
                <span class="text-xs font-semibold tracking-[0.25em] text-zinc-100 uppercase" translate="no">ClassTask //</span>
                <span class="text-[10px] font-mono text-zinc-500 bg-zinc-900 border border-brand-border px-2 py-0.5 rounded tracking-wider">v1.3</span>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="auth-status" class="flex items-center">
                    <button id="btn-open-login" class="text-xs font-medium tracking-wide text-zinc-300 border border-brand-border px-3.5 py-1.5 rounded bg-zinc-900/40 hover:border-brand-borderHover hover:text-white hover:bg-zinc-900/80 transition-all duration-200">Login</button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow max-w-2xl w-full mx-auto py-8 sm:py-12 relative z-10">
        
        <div class="flex border-b border-brand-border mb-6 sm:mb-8 gap-2" role="tablist">
            <button id="tab-public" class="pb-3 pr-6 text-xs font-medium tracking-wide border-b border-white text-white transition-all flex items-center gap-2.5">
                Public <span id="count-public" class="font-mono text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/10 tabular-numbers">00</span>
            </button>
            <button id="tab-private" class="pb-3 px-4 text-xs font-medium tracking-wide border-b border-transparent text-zinc-500 hover:text-zinc-300 transition-all flex items-center gap-2.5">
                Private <span id="count-private" class="font-mono text-[10px] bg-zinc-900 text-zinc-600 px-2 py-0.5 rounded border border-transparent tabular-numbers">00</span>
            </button>
        </div>

        <div id="error-toast" class="hidden mb-6 p-3.5 bg-rose-500/5 border border-rose-500/20 text-rose-400 text-xs font-mono rounded flex items-center gap-2.5">
            <span class="shrink-0 text-rose-500 font-bold">[!]</span>
            <div class="break-all"><span>SYSTEM_ERR //</span> <span id="error-message" class="text-zinc-300"></span></div>
        </div>

        <form id="todo-form" class="flex flex-col sm:flex-row border border-brand-border bg-brand-card/50 rounded-lg p-2 sm:p-1.5 mb-8 sm:mb-10 focus-within:border-indigo-500/40 focus-within:shadow-input-focus transition-all duration-200 backdrop-blur-xl gap-2 sm:gap-0">
            <input type="text" id="todo-input" required minlength="2" placeholder="Task eingeben..." 
                   class="flex-grow bg-transparent border-0 px-3 py-2 text-sm focus:ring-0 placeholder:text-zinc-600 text-zinc-100 outline-none font-sans w-full">
            
            <div class="flex items-center justify-between sm:justify-end gap-3 border-t sm:border-t-0 sm:border-l border-brand-border pt-2 sm:pt-0 sm:pl-3 px-2 sm:px-0 w-full sm:w-auto">
                <input type="date" id="todo-deadline" aria-label="Deadline"
                       class="bg-transparent border-0 text-xs font-mono text-zinc-400 outline-none focus:ring-0 cursor-pointer tracking-wide w-full sm:max-w-[135px]">
                
                <button type="submit" id="btn-submit-todo" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded font-medium text-xs tracking-wide transition-all duration-150 active:scale-[0.98] whitespace-nowrap">
                    Execute
                </button>
            </div>
        </form>

        <section id="panel-todos" class="bg-brand-card/20 border border-brand-border rounded-lg shadow-premium backdrop-blur-md overflow-hidden">
            <ul id="todo-list" class="divide-y divide-brand-border"></ul>
            
            <div id="empty-state" class="hidden text-center py-24 text-zinc-600 font-mono text-xs tracking-widest">
                // no_active_records_found
            </div>
        </section>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-brand-card border border-brand-border max-w-sm w-full p-6 shadow-premium rounded-lg relative" id="modal-card">
            <div class="text-xs font-semibold tracking-widest text-zinc-400 mb-6 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(79,70,229,0.6)]"></span>
                // Access_Control
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-medium text-zinc-400 uppercase tracking-wider mb-1.5">User Email</label>
                    <input type="email" id="auth-email" required class="w-full px-3 py-2 bg-zinc-950/50 border border-brand-border rounded text-sm text-white outline-none focus:border-indigo-500/50 font-mono transition-colors">
                </div>
                <div>
                    <label class="block text-[11px] font-medium text-zinc-400 uppercase tracking-wider mb-1.5">Password</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-3 py-2 bg-zinc-950/50 border border-brand-border rounded text-sm text-white outline-none focus:border-indigo-500/50 font-mono transition-colors">
                </div>
                <div class="flex gap-2.5 pt-2">
                    <button type="button" id="btn-close-modal" class="flex-1 px-4 py-2 border border-brand-border text-xs font-medium text-zinc-400 hover:text-white rounded hover:bg-zinc-900/50 transition-colors">Abort</button>
                    <button type="submit" id="btn-submit-auth" class="flex-1 px-4 py-2 bg-indigo-600 text-white text-xs font-medium hover:bg-indigo-500 rounded transition-colors">Authenticate</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="mt-auto border-t border-brand-border/60 py-6 text-center text-[10px] font-mono text-zinc-600 tracking-widest uppercase">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row justify-between items-center gap-2">
            <p>ClassTask // Terminal Connection Active</p>
            <p class="text-indigo-500/30 font-medium lowercase tracking-normal">node_secure_auth</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = "https://tlsrphqvnpvjaansofps.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_MHgFfuEb1Z8_Yq4vqfS2lg_QSvbeOUG";
        const COOKIE_NAME = "sb-automation-session";
        
        let supabaseClient = null;
        let currentTab = 'public'; 
        let user = null;
        let todos = [];

        const tabPublic = document.getElementById('tab-public');
        const tabPrivate = document.getElementById('tab-private');
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoDeadline = document.getElementById('todo-deadline');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        const authStatus = document.getElementById('auth-status');
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');

        function setSessionCookie(sessionData) {
            const jsonStr = JSON.stringify(sessionData);
            document.cookie = `${COOKIE_NAME}=${encodeURIComponent(jsonStr)}; path=/; max-age=31536000; SameSite=Lax; Secure`;
        }

        function getSessionCookie() {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${COOKIE_NAME}=`);
            if (parts.length === 2) {
                try {
                    return JSON.parse(decodeURIComponent(parts.pop().split(';').shift()));
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function eraseSessionCookie() {
            document.cookie = `${COOKIE_NAME}=; path=/; max-age=-1; SameSite=Lax; Secure`;
        }

        function startInitialization() {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
                initApp();
            } else {
                setTimeout(startInitialization, 100);
            }
        }

        async function initApp() {
            setupEventListeners();
            
            supabaseClient.auth.onAuthStateChange((event, session) => {
                user = session?.user ?? null;
                if (session) {
                    setSessionCookie(session);
                } else {
                    eraseSessionCookie();
                }
                updateUserUI();
                fetchTodos();
            });

            const savedSession = getSessionCookie();
            if (savedSession && savedSession.access_token && savedSession.refresh_token) {
                try {
                    const { data } = await supabaseClient.auth.setSession({
                        access_token: savedSession.access_token,
                        refresh_token: savedSession.refresh_token
                    });
                    user = data?.user ?? null;
                } catch(e) {}
            }

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                setSessionCookie(session);
            }
            
            updateUserUI();
            fetchTodos();
        }

        function updateUserUI() {
            if (user) {
                authStatus.innerHTML = `
                    <span class="text-[11px] font-mono text-zinc-400 mr-4 hidden sm:inline bg-zinc-900 border border-brand-border px-2.5 py-1 rounded">${user.email}</span>
                    <button id="btn-logout" class="text-xs font-medium text-rose-400 hover:text-rose-300 transition-colors">Disconnect</button>
                `;
                document.getElementById('btn-logout').addEventListener('click', async () => {
                    eraseSessionCookie();
                    await supabaseClient.auth.signOut();
                    window.location.reload();
                });
            } else {
                authStatus.innerHTML = `
                    <button id="btn-open-login" class="text-xs font-medium tracking-wide text-zinc-300 border border-brand-border px-3.5 py-1.5 rounded bg-zinc-900/40 hover:border-brand-borderHover hover:text-white hover:bg-zinc-900/80 transition-all duration-200">Login</button>
                `;
                document.getElementById('btn-open-login').addEventListener('click', () => loginModal.classList.remove('hidden'));
            }
            updateCounts();
        }

        async function fetchTodos() {
            if(!supabaseClient) return;
            document.getElementById('error-toast').classList.add('hidden');
            todoList.innerHTML = '';
            
            let query = supabaseClient.from('todos').select('*');

            if (currentTab === 'public') {
                query = query.eq('is_public', true);
            } else {
                if (!user) {
                    todoList.innerHTML = `<li class="text-center py-20 text-xs font-mono text-zinc-500 tracking-wide">// auth_required: identity token missing</li>`;
                    emptyState.classList.add('hidden');
                    return;
                }
                query = query.eq('is_public', false).eq('user_id', user.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                showError("Read failed: " + error.message);
                return;
            }

            todos = data || [];
            renderTodos();
            updateCounts();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            todos.forEach(todo => {
                const li = document.createElement('li');
                // items-center sorgt für die perfekte vertikale Ausrichtung aller Elemente in der Zeile
                li.className = "flex items-center justify-between py-3.5 px-4.5 hover:bg-white/[0.015] transition-all duration-150 group gap-3";
                
                const isChecked = todo.is_completed ? 'checked' : '';
                const textStyle = todo.is_completed ? 'line-through text-zinc-600 decoration-zinc-700 font-normal' : 'text-zinc-200 font-normal';

                let deadlineElement = '';
                if (todo.deadline && !todo.is_completed) {
                    const deadlineDate = new Date(todo.deadline);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const daysDiff = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
                    
                    let bgBadge = "bg-zinc-900 text-zinc-400 border-brand-border";
                    if (daysDiff <= 2) bgBadge = "bg-rose-500/5 border-rose-500/20 text-rose-400 font-medium";
                    else if (daysDiff <= 5) bgBadge = "bg-amber-500/5 border-amber-500/20 text-amber-400";

                    const formattedDate = deadlineDate.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
                    deadlineElement = `<span class="text-[10px] font-mono tracking-wider tabular-numbers border px-2 py-0.5 rounded ${bgBadge} whitespace-nowrap">${formattedDate}</span>`;
                }

                li.innerHTML = `
                    <div class="flex items-center gap-4 flex-grow min-w-0 px-1">
                        <input type="checkbox" ${isChecked} data-id="${todo.id}" class="todo-toggle w-4 h-4 rounded border-brand-border bg-zinc-950 text-indigo-600 focus:ring-0 cursor-pointer transition-all focus:ring-offset-0 checked:bg-indigo-600 checked:border-indigo-600 shrink-0">
                        <div class="flex items-center gap-4 min-w-0 flex-grow">
                            <span class="${textStyle} text-sm truncate font-sans">${escapeHTML(todo.title)}</span>
                            <div class="shrink-0">${deadlineElement}</div>
                        </div>
                    </div>
                    <button data-id="${todo.id}" class="todo-delete text-zinc-600 hover:text-rose-400 p-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-all duration-150 shrink-0" aria-label="Delete">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-todo');
            const title = todoInput.value.trim();
            const deadline = todoDeadline.value || null;
            if (!title || !supabaseClient) return;

            btn.disabled = true;
            btn.innerText = "//";

            const isPublic = (currentTab === 'public');
            const payload = { title: title, is_public: isPublic, deadline: deadline };
            if (user && user.id) payload.user_id = user.id;

            const { error } = await supabaseClient.from('todos').insert([payload]);
            btn.disabled = false;
            btn.innerText = "Execute";

            if (error) {
                showError("Execution stopped: " + error.message);
            } else { 
                todoInput.value = ''; 
                todoDeadline.value = ''; 
                fetchTodos(); 
            }
        });

        todoList.addEventListener('click', async (e) => {
            const target = e.target;
            if (target.classList.contains('todo-toggle')) {
                const id = target.getAttribute('data-id');
                await supabaseClient.from('todos').update({ is_completed: target.checked }).eq('id', id);
                fetchTodos();
            }
            if (target.closest('.todo-delete')) {
                const id = target.closest('.todo-delete').getAttribute('data-id');
                await supabaseClient.from('todos').delete().eq('id', id);
                fetchTodos();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('error-toast').classList.add('hidden');
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const submitBtn = document.getElementById('btn-submit-auth');

            submitBtn.disabled = true;
            submitBtn.innerText = "LINKING...";

            let { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error && (error.status === 400 || error.message.includes("Invalid login credentials"))) {
                const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
                error = signUpError;
                if (!error) {
                    if (signUpData?.session) {
                        setSessionCookie(signUpData.session);
                    }
                    loginModal.classList.add('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Authenticate";
                    return;
                }
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "Authenticate";

            if (error) {
                showError("Auth failed: " + error.message);
            } else {
                if (data?.session) {
                    setSessionCookie(data.session);
                }
                loginModal.classList.add('hidden');
            }
        });

        function setupEventListeners() {
            tabPublic.addEventListener('click', () => switchTab('public'));
            tabPrivate.addEventListener('click', () => switchTab('private'));
            document.getElementById('btn-close-modal').addEventListener('click', () => loginModal.classList.add('hidden'));
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'public') {
                tabPublic.className = "pb-3 pr-6 text-xs font-medium tracking-wide border-b border-white text-white transition-all flex items-center gap-2.5";
                tabPrivate.className = "pb-3 px-4 text-xs font-medium tracking-wide border-b border-transparent text-zinc-500 hover:text-zinc-300 transition-all flex items-center gap-2.5";
                todoInput.placeholder = "Task eingeben...";
                tabPrivate.querySelector('span').className = "font-mono text-[10px] bg-zinc-900 text-zinc-600 px-2 py-0.5 rounded border border-transparent tabular-numbers";
                tabPublic.querySelector('span').className = "font-mono text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/10 tabular-numbers";
            } else {
                tabPrivate.className = "pb-3 px-4 text-xs font-medium tracking-wide border-b border-white text-white transition-all flex items-center gap-2.5";
                tabPublic.className = "pb-3 pr-6 text-xs font-medium tracking-wide border-b border-transparent text-zinc-500 hover:text-zinc-300 transition-all flex items-center gap-2.5";
                todoInput.placeholder = "Private Task eingeben...";
                tabPublic.querySelector('span').className = "font-mono text-[10px] bg-zinc-900 text-zinc-600 px-2 py-0.5 rounded border border-transparent tabular-numbers";
                tabPrivate.querySelector('span').className = "font-mono text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/10 tabular-numbers";
            }
            fetchTodos();
        }

        async function updateCounts() {
            if (!supabaseClient) return;
            try {
                const { count: pubCount } = await supabaseClient.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', true);
                document.getElementById('count-public').innerText = String(pubCount || 0).padStart(2, '0');
                if (user) {
                    const { count: privCount } = await supabaseClient.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', false).eq('user_id', user.id);
                    document.getElementById('count-private').innerText = String(privCount || 0).padStart(2, '0');
                } else document.getElementById('count-private').innerText = '00';
            } catch(e) {}
        }

        function showError(msg) { const toast = document.getElementById('error-toast'); document.getElementById('error-message').innerText = msg; toast.classList.remove('hidden'); }
        function escapeHTML(str) { return str ? str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }

        document.addEventListener('DOMContentLoaded', startInitialization);
    </script>
</body>
</html>
