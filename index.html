<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">ClassTask — Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['BlinkMacSystemFont', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }

        // Darkmode Logik
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        *:focus-visible { outline: 1px solid #10b981; outline-offset: 2px; }
        .tabular-numbers { font-variant-numeric: tabular-nums; }
        /* HugoBlox Style Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 font-sans antialiased min-h-screen flex flex-col antialiased selection:bg-emerald-100 dark:selection:bg-emerald-950/50">

    <header class="bg-white/90 dark:bg-slate-950/90 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="text-base font-semibold tracking-tight uppercase" translate="no">ClassTask</span>
                <span class="text-[10px] text-slate-400 border border-slate-200 dark:border-slate-800 px-1.5 py-0.2 font-mono uppercase">v1.1</span>
            </div>
            
            <div class="flex items-center gap-6">
                <button id="theme-toggle" aria-label="Farbschema wechseln" class="text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100 transition-colors">
                    <svg id="theme-toggle-sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                    <svg id="theme-toggle-moon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>

                <div id="auth-status">
                    <button id="btn-open-login" class="text-xs font-medium border border-slate-900 dark:border-slate-100 px-3 py-1.5 hover:bg-slate-900 hover:text-white dark:hover:bg-slate-100 dark:hover:text-slate-950 transition-all">Anmelden</button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-grow max-w-4xl w-full mx-auto px-6 py-12">
        
        <div class="flex border-b border-slate-200 dark:border-slate-800 mb-8" role="tablist">
            <button id="tab-public" class="pb-3 pr-6 text-sm font-semibold border-b-2 border-emerald-500 text-slate-950 dark:text-white transition-all">
                👥 Klassen-ToDos <span id="count-public" class="ml-1 text-xs font-normal text-slate-400 dark:text-slate-500 tabular-numbers">(0)</span>
            </button>
            <button id="tab-private" class="pb-3 px-6 text-sm font-medium border-b-2 border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-950 dark:hover:text-white transition-all">
                🔒 Meine Aufgaben <span id="count-private" class="ml-1 text-xs font-normal text-slate-400 dark:text-slate-500 tabular-numbers">(0)</span>
            </button>
        </div>

        <div id="error-toast" class="hidden mb-6 p-3 bg-red-50 dark:bg-red-950/20 border border-red-200 dark:border-red-900/50 text-red-700 dark:text-red-400 text-xs font-mono break-all">
            <span id="error-message"></span>
        </div>

        <form id="todo-form" class="flex flex-col sm:flex-row gap-3 border border-slate-200 dark:border-slate-800 p-3 bg-slate-50/50 dark:bg-slate-900/20 mb-8">
            <input type="text" id="todo-input" required minlength="2" placeholder="Neue Aufgabe eintragen..." 
                   class="flex-grow bg-transparent border-0 px-2 py-1 text-sm focus:ring-0 placeholder:text-slate-400 dark:placeholder:text-slate-600 outline-none">
            
            <div class="flex items-center gap-3 border-t sm:border-t-0 sm:border-l border-slate-200 dark:border-slate-800 pt-3 sm:pt-0 sm:pl-3">
                <input type="date" id="todo-deadline" aria-label="Fälligkeitsdatum"
                       class="bg-transparent border-0 text-xs font-mono text-slate-500 dark:text-slate-400 outline-none focus:ring-0 cursor-pointer">
                
                <button type="submit" id="btn-submit-todo" class="bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-950 px-4 py-1.5 text-xs font-semibold tracking-wide uppercase hover:bg-emerald-600 dark:hover:bg-emerald-500 dark:hover:text-white transition-colors">
                    Add
                </button>
            </div>
        </form>

        <section id="panel-todos">
            <ul id="todo-list" class="divide-y divide-slate-200 dark:divide-slate-800/60 border-t border-b border-slate-200 dark:border-slate-800/60"></ul>
            
            <div id="empty-state" class="hidden text-center py-16 text-slate-400 dark:text-slate-600">
                <p class="text-sm font-mono">no_tasks_found.exe</p>
            </div>
        </section>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 max-w-sm w-full p-6 relative shadow-2xl" id="modal-card">
            <h2 class="text-sm font-bold uppercase tracking-wider mb-4">Authentifizierung</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">E-Mail</label>
                    <input type="email" id="auth-email" required class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1">Passwort</label>
                    <input type="password" id="auth-password" required minlength="6" class="w-full px-3 py-2 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm outline-none focus:border-emerald-500">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" id="btn-close-modal" class="flex-1 px-3 py-2 border border-slate-200 dark:border-slate-800 text-xs font-semibold uppercase hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">Abbrechen</button>
                    <button type="submit" id="btn-submit-auth" class="flex-1 px-3 py-2 bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-950 text-xs font-bold uppercase hover:bg-emerald-600 dark:hover:bg-emerald-500 dark:hover:text-white">Login</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-white dark:bg-slate-950 border-t border-slate-100 dark:border-slate-900 py-8 text-center text-xs font-mono text-slate-400 dark:text-slate-600">
        <div class="max-w-4xl mx-auto px-6">
            <p>© 2026 ClassTask. Published with Minimalist Engine.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = "https://tlsrphqvnpvjaansofps.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_MHgFfuEb1Z8_Yq4vqfS2lg_QSvbeOUG";
        
        let supabaseClient = null;
        let currentTab = 'public'; 
        let user = null;
        let todos = [];

        const themeToggle = document.getElementById('theme-toggle');
        const tabPublic = document.getElementById('tab-public');
        const tabPrivate = document.getElementById('tab-private');
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoDeadline = document.getElementById('todo-deadline');
        const todoList = document.getElementById('todo-list');
        const emptyState = document.getElementById('empty-state');
        const authStatus = document.getElementById('auth-status');
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');

        function startInitialization() {
            if (window.supabase && typeof window.supabase.createClient === 'function') {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                initApp();
            } else {
                setTimeout(startInitialization, 100);
            }
        }

        async function initApp() {
            setupEventListeners();
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                updateUser(session?.user ?? null);
            } catch(e) {}
            fetchTodos();
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        function updateUser(userData) {
            user = userData;
            if (user) {
                authStatus.innerHTML = `
                    <span class="text-xs font-mono text-slate-400 mr-4 hidden sm:inline">${user.email}</span>
                    <button id="btn-logout" class="text-xs font-semibold text-red-500 hover:text-red-600 uppercase tracking-wider">Sign Out</button>
                `;
                document.getElementById('btn-logout').addEventListener('click', async () => {
                    await supabaseClient.auth.signOut();
                    window.location.reload();
                });
            } else {
                authStatus.innerHTML = `
                    <button id="btn-open-login" class="text-xs font-medium border border-slate-900 dark:border-slate-100 px-3 py-1.5 hover:bg-slate-900 hover:text-white dark:hover:bg-slate-100 dark:hover:text-slate-950 transition-all">Anmelden</button>
                `;
                document.getElementById('btn-open-login').addEventListener('click', () => loginModal.classList.remove('hidden'));
            }
            updateCounts();
        }

        async function fetchTodos() {
            if(!supabaseClient) return;
            document.getElementById('error-toast').classList.add('hidden');
            
            let query = supabaseClient.from('todos').select('*');

            if (currentTab === 'public') {
                query = query.eq('is_public', true);
            } else {
                if (!user) {
                    todoList.innerHTML = `<li class="text-center py-12 text-xs font-mono text-slate-400">auth_required: please sign in</li>`;
                    emptyState.classList.add('hidden');
                    return;
                }
                query = query.eq('is_public', false).eq('user_id', user.id);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                showError("Error query: " + error.message);
                return;
            }

            todos = data || [];
            renderTodos();
            updateCounts();
        }

        function renderTodos() {
            todoList.innerHTML = '';
            if (todos.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between py-3.5 px-2 hover:bg-slate-50/60 dark:hover:bg-slate-900/40 transition-colors group";
                
                const isChecked = todo.is_completed ? 'checked' : '';
                const textStyle = todo.is_completed ? 'line-through text-slate-400 dark:text-slate-600 font-normal' : 'text-slate-800 dark:text-slate-200 font-normal';

                let deadlineBadge = '';
                if (todo.deadline && !todo.is_completed) {
                    const deadlineDate = new Date(todo.deadline);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const daysDiff = Math.ceil((deadlineDate - today) / (1000 * 60 * 60 * 24));
                    
                    let textColor = "text-slate-400 dark:text-slate-500";
                    if (daysDiff <= 2) textColor = "text-red-500 dark:text-red-400 font-medium";
                    else if (daysDiff <= 5) textColor = "text-amber-500 dark:text-amber-400 font-medium";

                    const formattedDate = deadlineDate.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
                    deadlineBadge = `<span class="text-xs font-mono tabular-numbers ${textColor}">[${formattedDate}]</span>`;
                }

                li.innerHTML = `
                    <div class="flex items-center gap-4 flex-grow mr-2 min-w-0">
                        <input type="checkbox" ${isChecked} data-id="${todo.id}" class="todo-toggle w-4 h-4 rounded-none border-slate-300 dark:border-slate-700 text-emerald-500 focus:ring-0 bg-transparent cursor-pointer transition-all">
                        <div class="flex items-center gap-3 min-w-0 flex-grow">
                            <span class="${textStyle} text-sm truncate">${escapeHTML(todo.title)}</span>
                            <div class="shrink-0">${deadlineBadge}</div>
                        </div>
                    </div>
                    <button data-id="${todo.id}" class="todo-delete text-slate-300 dark:text-slate-700 hover:text-red-500 dark:hover:text-red-400 p-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity" aria-label="Delete">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                `;
                todoList.appendChild(li);
            });
        }

        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-todo');
            const title = todoInput.value.trim();
            const deadline = todoDeadline.value || null;
            if (!title || !supabaseClient) return;

            btn.disabled = true;
            btn.innerText = "…";

            const isPublic = (currentTab === 'public');
            const payload = { title: title, is_public: isPublic, deadline: deadline };
            if (user && user.id) payload.user_id = user.id;

            const { error } = await supabaseClient.from('todos').insert([payload]);
            btn.disabled = false;
            btn.innerText = "Add";

            if (error) showError("Insert failed: " + error.message);
            else { todoInput.value = ''; todoDeadline.value = ''; fetchTodos(); }
        });

        todoList.addEventListener('click', async (e) => {
            const target = e.target;
            if (target.classList.contains('todo-toggle')) {
                const id = target.getAttribute('data-id');
                await supabaseClient.from('todos').update({ is_completed: target.checked }).eq('id', id);
                fetchTodos();
            }
            if (target.closest('.todo-delete')) {
                const id = target.closest('.todo-delete').getAttribute('data-id');
                await supabaseClient.from('todos').delete().eq('id', id);
                fetchTodos();
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            let { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                let { error: signUpError } = await supabaseClient.auth.signUp({ email, password });
                error = signUpError;
            }

            if (error) showError(error.message);
            else window.location.reload();
        });

        function setupEventListeners() {
            tabPublic.addEventListener('click', () => switchTab('public'));
            tabPrivate.addEventListener('click', () => switchTab('private'));
            document.getElementById('btn-close-modal').addEventListener('click', () => loginModal.classList.add('hidden'));
        }

        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'public') {
                tabPublic.className = "pb-3 pr-6 text-sm font-semibold border-b-2 border-emerald-500 text-slate-950 dark:text-white transition-all";
                tabPrivate.className = "pb-3 px-6 text-sm font-medium border-b-2 border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-950 dark:hover:text-white transition-all";
                todoInput.placeholder = "Neue Aufgabe eintragen...";
            } else {
                tabPrivate.className = "pb-3 px-6 text-sm font-semibold border-b-2 border-emerald-500 text-slate-950 dark:text-white transition-all";
                tabPublic.className = "pb-3 pr-6 text-sm font-medium border-b-2 border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-950 dark:hover:text-white transition-all";
                todoInput.placeholder = "Private Aufgabe eintragen...";
            }
            fetchTodos();
        }

        async function updateCounts() {
            if (!supabaseClient) return;
            try {
                const { count: pubCount } = await supabaseClient.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', true);
                document.getElementById('count-public').innerText = `(${pubCount || 0})`;
                if (user) {
                    const { count: privCount } = await supabaseClient.from('todos').select('*', { count: 'exact', head: true }).eq('is_public', false).eq('user_id', user.id);
                    document.getElementById('count-private').innerText = `(${privCount || 0})`;
                } else document.getElementById('count-private').innerText = '(0)';
            } catch(e) {}
        }

        function showError(msg) { const toast = document.getElementById('error-toast'); document.getElementById('error-message').innerText = msg; toast.classList.remove('hidden'); }
        function escapeHTML(str) { return str ? str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)) : ''; }

        document.addEventListener('DOMContentLoaded', startInitialization);
    </script>
</body>
</html>
